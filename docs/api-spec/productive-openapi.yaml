      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - created_at
          - id
          - -created_at
          - -id
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
