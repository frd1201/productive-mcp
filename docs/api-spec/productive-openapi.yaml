openapi: 3.0.3
info:
  title: Productive.io API
  description: |-
    REST API - Productive.io (project management, time tracking, invoicing).
    Spec: JSON API (https://jsonapi.org/)
    Docs: https://developer.productive.io

    Auth headers on every request:
      X-Auth-Token: <token>       (Settings > API integrations)
      X-Organization-Id: <org_id>

    Pagination: page[number] (default 1), page[size] (default 30, max 200)
    Rate limits: 100 req/10s | 4000 req/30min | Reports: 10 req/30s
  version: 2.0.0
servers:
- url: https://api.productive.io/api/v2
security:
- ApiKeyAuth: []
  OrgIdHeader: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Auth-Token
    OrgIdHeader:
      type: apiKey
      in: header
      name: X-Organization-Id
