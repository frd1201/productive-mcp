openapi: 3.0.3
info:
  title: Productive.io API – Timers
  version: 2.0.0
paths:
  /api/v2/timers:
    get:
      summary: Get timers GET
      operationId: getTimers
      tags:
      - Timers
      parameters:
      - name: filter[time_entry_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by time_entry_id (string)
      - name: filter[person_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by person_id (string)
      - name: filter[started_at]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter by started_at (date)
      - name: filter[stopped_at]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter by stopped_at (date)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - started_at
          - stopped_at
          - -started_at
          - -stopped_at
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create an timer POST
      operationId: postTimers
      tags:
      - Timers
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/timers/{id}:
    get:
      summary: Gets a timer GET
      operationId: getTimersId
      tags:
      - Timers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
  /api/v2/timers/{id}/stop:
    patch:
      summary: Stops a timer PATCH
      operationId: patchTimersIdStop
      tags:
      - Timers
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
