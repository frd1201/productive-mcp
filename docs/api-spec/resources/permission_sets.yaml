openapi: 3.0.3
info:
  title: Productive.io API – Permission Sets
  version: 2.0.0
paths:
  /api/v2/roles:
    get:
      summary: Get permission sets GET
      operationId: getRoles
      tags:
      - Permission Sets
      parameters:
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
  /api/v2/roles/{id}:
    get:
      summary: Gets a permission set GET
      operationId: getRolesId
      tags:
      - Permission Sets
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
