openapi: 3.0.3
info:
  title: Productive.io API – Exchange Rates
  version: 2.0.0
paths:
  /api/v2/exchange_rates:
    get:
      summary: Get exchange rates GET
      operationId: getExchangeRates
      tags:
      - Exchange Rates
      parameters:
      - name: filter[date]
        in: query
        required: false
        schema:
          type: string
        description: Filter by date (string)
      - name: filter[out_of_date]
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by out_of_date (boolean)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - date
          - -date
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
