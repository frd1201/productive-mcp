        description: Filter by two_factor_auth (string)
      - name: filter[team]
        in: query
        required: false
        schema:
          type: string
        description: Filter by team (string)
      - name: filter[autotracking]
        in: query
        required: false
        schema:
          type: string
        description: Filter by autotracking (string)
      - name: filter[custom_role_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by custom_role_id (string)
      - name: filter[manager_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by manager_id (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by project_id (string)
      - name: filter[timesheet_submission_disabled]
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by timesheet_submission_disabled (boolean)
      - name: filter[time_tracking_policy_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by time_tracking_policy_id (string)
      - name: filter[service_type_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by service_type_id (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - name
          - email
          - title
          - last_seen_at
          - joined_at
          - role_id
          - autotracking
          - company_name
          - custom_role
          - custom_fields
          - two_factor_auth
          - schedulable
          - manager
          - -name
          - -email
          - -title
          - -last_seen_at
          - -joined_at
          - -role_id
          - -autotracking
          - -company_name
          - -custom_role
          - -custom_fields
          - -two_factor_auth
          - -schedulable
          - -manager
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
