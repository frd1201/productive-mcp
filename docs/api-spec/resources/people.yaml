        description: 'Filter by status (1: active, 2: deactivated)'
      - name: filter[person_type]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by person_type (1: user, 2: contact, 3: placeholder)'
      - name: filter[role_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by role_id (array)
      - name: filter[company_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by company_id (array)
