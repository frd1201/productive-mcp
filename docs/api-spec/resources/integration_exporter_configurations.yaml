        description: Filter by company_id (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - client_id
          - company_type
          - -client_id
          - -company_type
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
