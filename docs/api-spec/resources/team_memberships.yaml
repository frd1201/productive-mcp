openapi: 3.0.3
info:
  title: Productive.io API – Team Memberships
  version: 2.0.0
paths:
  /api/v2/team_memberships:
    get:
      summary: Get team memberships GET
      operationId: getTeamMemberships
      tags:
      - Team Memberships
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[person_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by person_id (string)
      - name: filter[team_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by team_id (string)
      - name: filter[person_name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by person_name (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a team membership POST
      operationId: postTeamMemberships
      tags:
      - Team Memberships
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/team_memberships/{id}:
    get:
      summary: Gets a team membership GET
      operationId: getTeamMembershipsId
      tags:
      - Team Memberships
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    delete:
      summary: Deletes a team membership DELETE
      operationId: deleteTeamMembershipsId
      tags:
      - Team Memberships
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
