openapi: 3.0.3
info:
  title: Productive.io API – Custom Fields
  version: 2.0.0
paths:
  /api/v2/custom_fields:
    get:
      summary: Get custom fields GET
      operationId: getCustomFields
      tags:
      - Custom Fields
      parameters:
      - name: filter[name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by name (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by project_id (string)
      - name: filter[customizable_type]
        in: query
        required: false
        schema:
          type: string
        description: Filter by customizable_type (string)
      - name: filter[archived]
        in: query
        required: false
        schema:
          type: string
        description: "Filter by archived (â\x80\x98trueâ\x80\x99 or â\x80\x98falseâ\x80\
          \x99)"
      - name: filter[global]
        in: query
        required: false
        schema:
          type: string
        description: "Filter by global (â\x80\x98trueâ\x80\x99 or â\x80\x98falseâ\x80\
          \x99)"
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Creates a custom field POST
      operationId: postCustomFields
      tags:
      - Custom Fields
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
