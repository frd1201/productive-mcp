openapi: 3.0.3
info:
  title: Productive.io API – Survey Responses
  version: 2.0.0
paths:
  /api/v2/survey_responses:
    get:
      summary: Get survey responses GET
      operationId: getSurveyResponses
      tags:
      - Survey Responses
      parameters:
      - name: filter[created_at]
        in: query
        required: false
        schema:
          type: string
        description: Filter by created_at (string)
      - name: filter[creator_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by creator_id (string)
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[survey_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by survey_id (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - created_at
          - creator_id
          - custom_fields
          - id
          - survey_id
          - updated_at
          - -created_at
          - -creator_id
          - -custom_fields
          - -id
          - -survey_id
          - -updated_at
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a survey response POST
      operationId: postSurveyResponses
      tags:
      - Survey Responses
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/survey_responses/{id}:
    get:
      summary: Gets a survey response GET
      operationId: getSurveyResponsesId
      tags:
      - Survey Responses
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    delete:
      summary: Deletes a survey response DELETE
      operationId: deleteSurveyResponsesId
      tags:
      - Survey Responses
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
