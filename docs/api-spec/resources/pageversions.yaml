openapi: 3.0.3
info:
  title: Productive.io API – Pageversions
  version: 2.0.0
paths:
  /api/v2/page_versions:
    get:
      summary: Get page_versions GET
      operationId: getPageVersions
      tags:
      - Pageversions
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[page_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by page_id (string)
      - name: filter[person_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by person_id (string)
      - name: filter[restored_from_version_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by restored_from_version_id (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - name
          - created_at
          - updated_at
          - -name
          - -created_at
          - -updated_at
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
