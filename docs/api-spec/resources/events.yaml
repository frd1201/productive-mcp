      summary: Deletes an event DELETE
      operationId: deleteEventsId
      tags:
      - Events
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
