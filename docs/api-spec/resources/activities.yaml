openapi: 3.0.3
info:
  title: Productive.io API – Activities
  version: 2.0.0
paths:
  /api/v2/activities:
    get:
      summary: Get activities GET
      operationId: getActivities
      tags:
      - Activities
      parameters:
      - name: filter[after]
        in: query
        required: false
        schema:
          type: string
        description: Filter by after (string)
      - name: filter[before]
        in: query
        required: false
        schema:
          type: string
        description: Filter by before (string)
      - name: filter[booking_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by booking_id (array)
      - name: filter[company_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by company_id (array)
      - name: filter[creator_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by creator_id (array)
      - name: filter[deal_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by deal_id (array)
      - name: filter[discussion_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by discussion_id (array)
      - name: filter[event]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: "Filter by event (create, copy, updateâ\x80¦)"
      - name: filter[expense_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by expense_id (array)
      - name: filter[has_attachments]
        in: query
        required: false
        schema:
          type: string
        description: Filter by has_attachments (string)
      - name: filter[invoice_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by invoice_id (array)
      - name: filter[item_type]
        in: query
        required: false
        schema:
          type: string
        description: "Filter by item_type (Workspace, Task, Page, Dealâ\x80¦)"
      - name: filter[parent_type]
        in: query
        required: false
        schema:
          type: string
        description: "Filter by parent_type (Workspace, Task, Page, Dealâ\x80¦)"
      - name: filter[participant_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by participant_id (string)
      - name: filter[person_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by person_id (array)
      - name: filter[pinned]
        in: query
        required: false
        schema:
          type: string
        description: Filter by pinned (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by project_id (array)
      - name: filter[purchase_order_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by purchase_order_id (string)
      - name: filter[root_type]
        in: query
        required: false
        schema:
          type: string
        description: "Filter by root_type (Workspace, Page, Personâ\x80¦)"
      - name: filter[task_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by task_id (array)
      - name: filter[type]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by type (1: Comment, 2: Changeset, 3: Email)'
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
  /api/v2/activities/{id}:
    get:
      summary: Gets a activity GET
      operationId: getActivitiesId
      tags:
      - Activities
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
