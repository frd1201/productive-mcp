      - name: filter[last_activity_after]
        in: query
        required: false
        schema:
          type: string
        description: Filter by last_activity_after (string)
      - name: filter[last_activity_before]
        in: query
        required: false
        schema:
          type: string
        description: Filter by last_activity_before (string)
      - name: filter[overdue_status]
        in: query
