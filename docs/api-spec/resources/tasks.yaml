          type: string
        description: 'Filter by project_type (1: internal project, 2 :client project)'
      - name: filter[public_access]
        in: query
        required: false
        schema:
          type: string
        description: Filter by public_access (string)
      - name: filter[query]
        in: query
        required: false
        schema:
          type: string
        description: Filter by query (string)
      - name: filter[remaining_time]
        in: query
