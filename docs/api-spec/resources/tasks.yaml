        in: query
        required: false
        schema:
          type: string
        description: Filter by task_number (string)
      - name: filter[task_type]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by task_type (1: parent task, 2: subtask)'
      - name: filter[title]
        in: query
        required: false
        schema:
          type: string
        description: Filter by title (string)
      - name: filter[updated_at]
        in: query
        required: false
        schema:
          type: string
        description: Filter by updated_at (string)
      - name: filter[worked_time]
        in: query
        required: false
