        schema:
          type: array
          items:
            type: string
        description: Filter by workflow_id (array)
      - name: filter[workflow_status_category_id]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by workflow_status_category_id (1: not started, 2: started,
          3: closed)'
      - name: filter[workflow_status_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by workflow_status_id (array)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - assignee_name
          - billable_time
          - board_name
          - board_position
          - closed_at
          - company_name
          - created_at
          - creator_name
          - custom_fields
          - due_date - sorts due_date and then due_time
          - placement
          - id
          - initial_estimate
          - last_activity
          - last_activity_at
          - last_actor_name
          - number
          - project_name
          - remaining_time
          - start_date
          - task_list_name
          - task_list_position
          - task_number
          - title
          - updated_at
          - worked_time
          - workflow_status_name
          - workflow_status_position
          - -assignee_name
          - -billable_time
          - -board_name
          - -board_position
          - -closed_at
          - -company_name
          - -created_at
          - -creator_name
          - -custom_fields
          - -due_date - sorts due_date and then due_time
          - -placement
          - -id
          - -initial_estimate
          - -last_activity
          - -last_activity_at
          - -last_actor_name
          - -number
          - -project_name
          - -remaining_time
          - -start_date
          - -task_list_name
          - -task_list_position
          - -task_number
          - -title
          - -updated_at
          - -worked_time
          - -workflow_status_name
          - -workflow_status_position
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a task POST
      operationId: postTasks
      tags:
      - Tasks
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
