        schema:
          type: string
        description: Filter by after (string)
      - name: filter[assignee_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by assignee_id (array)
      - name: filter[before]
        in: query
        required: false
        schema:
          type: string
        description: Filter by before (string)
