      - name: filter[project_type]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by project_type (array)
      - name: filter[person_type]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by person_type (1: user, 2: contact, 3: placeholder)'
      - name: filter[approval_status]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by approval_status (array)
      - name: filter[status]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by status (array)
      - name: filter[billing_type_id]
        in: query
        required: false
        schema:
          type: integer
        description: Filter by billing_type_id (integer)
      - name: filter[autotracking]
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by autotracking (boolean)
      - name: filter[booking_type]
        in: query
        required: false
        schema:
          type: string
        description: Filter by booking_type (event, service)
      - name: filter[person_subsidiary_id]
        in: query
        required: false
        schema:
          type: integer
        description: Filter by person_subsidiary_id (integer)
      - name: filter[canceled]
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by canceled (boolean)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - id (integer)
          - started_on (date)
          - last_activity_at (date)
          - draft (boolean)
          - -id (integer)
          - -started_on (date)
          - -last_activity_at (date)
          - -draft (boolean)
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
