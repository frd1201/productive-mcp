openapi: 3.0.3
info:
  title: Productive.io API – Bankaccounts
  version: 2.0.0
paths:
  /api/v2/bank_accounts:
    get:
      summary: Get bank accounts GET
      operationId: getBankAccounts
      tags:
      - Bankaccounts
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[bank_name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by bank_name (string)
      - name: filter[name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by name (string)
      - name: filter[subsidiary_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by subsidiary_id (string)
      - name: filter[status]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by status (1: active, 2: archived)'
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - id
          - name
          - -id
          - -name
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
