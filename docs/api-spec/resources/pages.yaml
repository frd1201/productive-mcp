openapi: 3.0.3
info:
  title: Productive.io API – Pages
  version: 2.0.0
paths:
  /api/v2/pages:
    get:
      summary: Get pages GET
      operationId: getPages
      tags:
      - Pages
      parameters:
      - name: filter[creator_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by creator_id (string)
      - name: filter[edited_at]
        in: query
        required: false
        schema:
          type: string
        description: Filter by edited_at (string)
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by project_id (array)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - created_at
          - creator_name
          - edited_at
          - project
          - title
          - updated_at
          - -created_at
          - -creator_name
          - -edited_at
          - -project
          - -title
          - -updated_at
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a page POST
      operationId: postPages
      tags:
      - Pages
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
