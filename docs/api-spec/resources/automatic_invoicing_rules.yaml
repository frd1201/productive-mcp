paths:
  /api/v2/automatic_invoicing_rules:
    get:
      summary: Get automatic invoicing rules GET
      operationId: getAutomaticInvoicingRules
      tags:
      - Automatic Invoicing Rules
      parameters:
      - name: filter[budget_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by budget_id (array)
      - name: filter[creator_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by creator_id (array)
      - name: filter[id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by id (array)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - created_at
          - id
          - -created_at
          - -id
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
