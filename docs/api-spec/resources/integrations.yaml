openapi: 3.0.3
info:
  title: Productive.io API – Integrations
  version: 2.0.0
paths:
  /api/v2/integrations:
    get:
      summary: Get integration GET
      operationId: getIntegrations
      tags:
      - Integrations
      parameters:
      - name: filter[integration_type_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by integration_type_id (string)
      - name: filter[jira_organization]
        in: query
        required: false
        schema:
          type: string
        description: Filter by jira_organization (string)
      - name: filter[jira_project]
        in: query
        required: false
        schema:
          type: string
        description: Filter by jira_project (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by project_id (string)
      - name: filter[deal_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by deal_id (string)
      - name: filter[subsidiary_id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by subsidiary_id (string)
      - name: filter[project_status]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by project_status (1: active, 2: archived)'
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - id
          - created_at
          - -id
          - -created_at
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create an integration POST
      operationId: postIntegrations
      tags:
      - Integrations
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/integrations/{id}:
    get:
      summary: Gets an integration GET
      operationId: getIntegrationsId
      tags:
      - Integrations
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    delete:
      summary: Deletes an integration DELETE
      operationId: deleteIntegrationsId
      tags:
      - Integrations
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /api/v2/integrations/{id}/check:
    get:
      summary: Checks if integration is valid GET
      operationId: getIntegrationsIdCheck
      tags:
      - Integrations
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
