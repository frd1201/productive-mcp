openapi: 3.0.3
info:
  title: Productive.io API – Approval Policies
  version: 2.0.0
paths:
  /api/v2/approval_policies:
    get:
      summary: Get approval policies GET
      operationId: getApprovalPolicies
      tags:
      - Approval Policies
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[custom]
        in: query
        required: false
        schema:
          type: boolean
        description: Filter by custom (boolean)
      - name: filter[status]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by status (active: 1, archived: 2)'
      - name: filter[type_id]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by type_id (event: 1, budget: 2)'
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Creates the approval policy POST
      operationId: postApprovalPolicies
      tags:
      - Approval Policies
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
