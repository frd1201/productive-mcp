openapi: 3.0.3
info:
  title: Productive.io API – Taxrates
  version: 2.0.0
paths:
  /api/v2/tax_rates:
    get:
      summary: Get tax rates GET
      operationId: getTaxRates
      tags:
      - Taxrates
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by name (string)
      - name: filter[primary_component_name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by primary_component_name (string)
      - name: filter[primary_component_value]
        in: query
        required: false
        schema:
          type: string
        description: Filter by primary_component_value (string)
      - name: filter[secondary_component_name]
        in: query
        required: false
        schema:
          type: string
        description: Filter by secondary_component_name (string)
      - name: filter[secondary_component_value]
        in: query
        required: false
        schema:
          type: string
        description: Filter by secondary_component_value (string)
      - name: filter[subsidiary]
        in: query
        required: false
        schema:
          type: string
        description: Filter by subsidiary (string)
      - name: filter[status]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by status (1: active, 2: archived)'
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - name
          - subsidiary_name
          - -name
          - -subsidiary_name
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
