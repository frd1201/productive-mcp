openapi: 3.0.3
info:
  title: Productive.io API – Resource Requests
  version: 2.0.0
paths:
  /api/v2/resource_requests:
    get:
      summary: Get resource requests GET
      operationId: getResourceRequests
      tags:
      - Resource Requests
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by id (array)
      - name: filter[service_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by service_id (array)
      - name: filter[creator_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by creator_id (array)
      - name: filter[resolver_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by resolver_id (array)
      - name: filter[created_at]
        in: query
        required: false
        schema:
          type: string
        description: Filter by created_at (string)
      - name: filter[status]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by status (array)
      - name: filter[started_on]
        in: query
        required: false
        schema:
          type: string
        description: Filter by started_on (string)
      - name: filter[ended_on]
        in: query
        required: false
        schema:
          type: string
        description: Filter by ended_on (string)
      - name: filter[title]
        in: query
        required: false
        schema:
          type: string
        description: Filter by title (string)
      - name: filter[deleted_at]
        in: query
        required: false
        schema:
          type: string
        description: Filter by deleted_at (string)
      - name: filter[resolved_at]
        in: query
        required: false
        schema:
          type: string
        description: Filter by resolved_at (string)
      - name: filter[query]
        in: query
        required: false
        schema:
          type: string
        description: Filter by query (string)
      - name: filter[time]
        in: query
        required: false
        schema:
          type: string
        description: Filter by time (string)
      - name: filter[time_to_close]
        in: query
        required: false
        schema:
          type: string
        description: Filter by time_to_close (string)
      - name: filter[job_title]
        in: query
        required: false
        schema:
          type: string
        description: Filter by job_title (string)
      - name: filter[subsidiary_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by subsidiary_id (array)
      - name: filter[workplace_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by workplace_id (array)
      - name: filter[team_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by team_id (array)
      - name: filter[service_type_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by service_type_id (array)
      - name: filter[tags]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by tags (array)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - id
          - status
          - booking_method_id
          - time
          - total_time
          - percentage
          - created_at
          - resolved_at
          - started_on
          - ended_on
          - service
          - creator
          - resolver
          - -id
          - -status
          - -booking_method_id
          - -time
          - -total_time
          - -percentage
          - -created_at
          - -resolved_at
          - -started_on
          - -ended_on
          - -service
          - -creator
          - -resolver
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a resource request POST
      operationId: postResourceRequests
      tags:
      - Resource Requests
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/resource_requests/{id}:
