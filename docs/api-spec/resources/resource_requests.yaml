    delete:
      summary: Deletes a resource request DELETE
      operationId: deleteResourceRequestsId
      tags:
      - Resource Requests
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /api/v2/resource_requests/{id}/cancel:
    patch:
