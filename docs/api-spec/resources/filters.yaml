      - name: filter[filterable_collection]
        in: query
        required: false
        schema:
          type: string
        description: Filter by filterable_collection (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
