      summary: Get filters GET
      operationId: getFilters
      tags:
      - Filters
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by project_id (array)
      - name: filter[filterable_collection]
        in: query
        required: false
        schema:
          type: string
        description: Filter by filterable_collection (string)
      - name: filter[id]
