openapi: 3.0.3
info:
  title: Productive.io API – Contracts
  version: 2.0.0
paths:
  /api/v2/contracts:
    get:
      summary: Get contracts GET
      operationId: getContracts
      tags:
      - Contracts
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: integer
        description: Filter by id (integer)
      - name: filter[contract_interval_id]
        in: query
        required: false
        schema:
          type: integer
        description: Filter by contract_interval_id (integer)
      - name: filter[starts_on]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter by starts_on (date)
      - name: filter[ends_on]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter by ends_on (date)
      - name: filter[next_occurrence_on]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter by next_occurrence_on (date)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a contract POST
      operationId: postContracts
      tags:
      - Contracts
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/contracts/{id}:
    get:
      summary: Gets a contract GET
      operationId: getContractsId
      tags:
      - Contracts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    patch:
      summary: Update a contract PATCH
      operationId: patchContractsId
      tags:
      - Contracts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
    delete:
      summary: Deletes a contract DELETE
      operationId: deleteContractsId
      tags:
      - Contracts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /api/v2/contracts/{id}/generate:
    post:
      summary: Generates new budget POST
      operationId: postContractsIdGenerate
      tags:
      - Contracts
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
