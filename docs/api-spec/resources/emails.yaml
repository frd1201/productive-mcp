openapi: 3.0.3
info:
  title: Productive.io API – Emails
  version: 2.0.0
paths:
  /api/v2/emails:
    get:
      summary: Get emails GET
      operationId: getEmails
      tags:
      - Emails
      parameters:
      - name: filter[status]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by status (1: unresolved, 2: resolved, 3: dismissed)'
      - name: filter[creator_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by creator_id (array)
      - name: filter[recipient_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by recipient_id (array)
      - name: filter[sender_or_recipient_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by sender_or_recipient_id (array)
      - name: filter[before]
        in: query
        required: false
        schema:
          type: string
        description: Filter by before (string)
      - name: filter[after]
        in: query
        required: false
        schema:
          type: string
        description: Filter by after (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
  /api/v2/emails/{id}:
    get:
      summary: Gets a email GET
      operationId: getEmailsId
      tags:
      - Emails
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    delete:
      summary: Deletes a email DELETE
      operationId: deleteEmailsId
      tags:
      - Emails
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
  /api/v2/emails/{id}/attach:
    patch:
      summary: Attachs a email PATCH
      operationId: patchEmailsIdAttach
      tags:
      - Emails
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/emails/{id}/dismiss:
    patch:
      summary: Dismisses a email PATCH
      operationId: patchEmailsIdDismiss
      tags:
      - Emails
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
