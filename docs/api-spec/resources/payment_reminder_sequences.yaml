openapi: 3.0.3
info:
  title: Productive.io API – Payment Reminder Sequences
  version: 2.0.0
paths:
  /api/v2/payment_reminder_sequences:
    get:
      summary: Get payment reminder sequences GET
      operationId: getPaymentReminderSequences
      tags:
      - Payment Reminder Sequences
      parameters:
      - name: filter[default_sequence]
        in: query
        required: false
        schema:
          type: string
        description: Filter by default_sequence (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - default_sequence
          - -default_sequence
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a payment reminder sequence POST
      operationId: postPaymentReminderSequences
      tags:
      - Payment Reminder Sequences
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
