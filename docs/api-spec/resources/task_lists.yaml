openapi: 3.0.3
info:
  title: Productive.io API – Task Lists
  version: 2.0.0
paths:
  /api/v2/task_lists:
    get:
      summary: Get task lists GET
      operationId: getTaskLists
      tags:
      - Task Lists
      parameters:
      - name: filter[id]
        in: query
        required: false
        schema:
          type: string
        description: Filter by id (string)
      - name: filter[project_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by project_id (array)
      - name: filter[board_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by board_id (array)
      - name: filter[status]
        in: query
        required: false
        schema:
          type: string
        description: 'Filter by status (active: 1, archived: 2)'
      - name: filter[board]
        in: query
        required: false
        schema:
          type: string
        description: Filter by board (string)
      - name: filter[project]
        in: query
        required: false
        schema:
          type: string
        description: Filter by project (string)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a task list POST
      operationId: postTaskLists
      tags:
      - Task Lists
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
