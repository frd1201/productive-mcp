openapi: 3.0.3
info:
  title: Productive.io API – Placeholder Usages
  version: 2.0.0
paths:
  /api/v2/placeholder_usages:
    get:
      summary: Get placeholder usages GET
      operationId: getPlaceholderUsages
      tags:
      - Placeholder Usages
      parameters:
      - name: filter[field]
        in: query
        required: false
        schema:
          type: string
          format: date
        description: Filter by field (assignee, subscriber, due_date, start_date)
      - name: filter[interval_enabled]
        in: query
        required: false
        schema:
          type: string
        description: Filter by interval_enabled (true, false)
      - name: filter[placeholder_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by placeholder_id (array)
      - name: filter[skip_weekends]
        in: query
        required: false
        schema:
          type: string
        description: Filter by skip_weekends (true, false)
      - name: filter[target_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by target_id (array)
      - name: filter[target_type]
        in: query
        required: false
        schema:
          type: string
        description: Filter by target_type (string)
      - name: filter[task_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by task_id (array)
      - name: filter[todo_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by todo_id (array)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - created_at
          - field
          - id
          - interval_value
          - -created_at
          - -field
          - -id
          - -interval_value
        description: Sort field. Prefix - for descending.
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    post:
      summary: Create a placeholder usage POST
      operationId: postPlaceholderUsages
      tags:
      - Placeholder Usages
      parameters: []
      responses:
        '201':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
  /api/v2/placeholder_usages/{id}:
    get:
      summary: Gets a placeholder usage GET
      operationId: getPlaceholderUsagesId
      tags:
      - Placeholder Usages
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
    patch:
      summary: Update a placeholder usage PATCH
      operationId: patchPlaceholderUsagesId
      tags:
      - Placeholder Usages
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                    attributes:
                      type: object
                    relationships:
                      type: object
    delete:
      summary: Deletes a placeholder usage DELETE
      operationId: deletePlaceholderUsagesId
      tags:
      - Placeholder Usages
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: id of the resource
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
