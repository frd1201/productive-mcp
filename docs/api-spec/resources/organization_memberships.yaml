    get:
      summary: Get organization memberships GET
      operationId: getOrganizationMemberships
      tags:
      - Organization Memberships
      parameters:
      - name: filter[organization_id]
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: Filter by organization_id (array)
      - name: page[number]
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: page[size]
        in: query
        required: false
        schema:
          type: integer
          default: 30
          maximum: 200
      responses:
        '200':
          description: Success
          content:
            application/vnd.api+json:
              schema:
                type: object
                properties:
                  data: {}
                  meta:
                    type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation error
